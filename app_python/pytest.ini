[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --strict-markers
    --tb=short
    --cov=.
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    --cov-fail-under=80

[coverage:run]
omit = 
    tests/*
    venv/*
    env/*
    */site-packages/*
    __pycache__/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False