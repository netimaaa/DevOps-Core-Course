---
# Docker installation tasks

- name: Docker installation block
  block:
    - name: Install prerequisites for Docker repository
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present

    - name: Create directory for Docker GPG key
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        keyring: /etc/apt/keyrings/docker.gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
        filename: docker

    - name: Update apt cache after adding Docker repository
      apt:
        update_cache: yes

    - name: Install Docker packages
      apt:
        name: "{{ docker_packages }}"
        state: present
      notify: restart docker

  rescue:
    - name: Wait and retry on GPG key failure
      pause:
        seconds: 10

    - name: Retry apt update
      apt:
        update_cache: yes

  always:
    - name: Ensure Docker service is enabled
      service:
        name: docker
        enabled: yes

  become: true
  tags:
    - docker_install
    - docker

- name: Docker configuration block
  block:
    - name: Ensure Docker service is running
      service:
        name: docker
        state: started

    - name: Add user to docker group
      user:
        name: "{{ docker_user }}"
        groups: docker
        append: yes

    - name: Install python3-docker for Ansible docker modules
      apt:
        name: python3-docker
        state: present

  always:
    - name: Log Docker configuration completion
      copy:
        content: "Docker configuration completed at {{ ansible_date_time.iso8601 }}"
        dest: /tmp/docker_config.log
        mode: '0644'

  become: true
  tags:
    - docker_config
    - docker