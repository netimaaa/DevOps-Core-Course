---
# Common system setup tasks

- name: Package installation block
  block:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install common packages
      apt:
        name: "{{ common_packages }}"
        state: present

  rescue:
    - name: Handle apt cache update failure
      command: apt-get update --fix-missing
      changed_when: false

  always:
    - name: Log package installation completion
      copy:
        content: "Common packages installation completed at {{ ansible_date_time.iso8601 }}"
        dest: /tmp/common_packages_install.log
        mode: '0644'

  become: true
  tags:
    - packages
    - common

- name: User management block
  block:
    - name: Set timezone
      timezone:
        name: "{{ timezone }}"

  always:
    - name: Log user management completion
      copy:
        content: "User management tasks completed at {{ ansible_date_time.iso8601 }}"
        dest: /tmp/common_users.log
        mode: '0644'

  become: true
  tags:
    - users
    - common