---
# Application deployment tasks with Docker Compose

# Wipe logic runs first (when explicitly requested)
- name: Include wipe tasks
  include_tasks: wipe.yml
  tags:
    - web_app_wipe

# Deployment tasks follow
- name: Deploy application with Docker Compose
  block:
    - name: Create app directory
      file:
        path: "{{ compose_project_dir }}"
        state: directory
        mode: '0755'

    - name: Template docker-compose file
      template:
        src: docker-compose.yml.j2
        dest: "{{ compose_project_dir }}/docker-compose.yml"
        mode: '0644'

    - name: Login to Docker Hub
      community.docker.docker_login:
        username: "{{ dockerhub_username }}"
        password: "{{ dockerhub_password }}"
      no_log: true
      when: dockerhub_username is defined and dockerhub_password is defined

    - name: Pull latest Docker images
      community.docker.docker_compose_v2:
        project_src: "{{ compose_project_dir }}"
        pull: always
      register: pull_result

    - name: Deploy with docker-compose
      community.docker.docker_compose_v2:
        project_src: "{{ compose_project_dir }}"
        state: present
        recreate: auto
      register: compose_result

    - name: Wait for application to be ready
      wait_for:
        port: "{{ app_port }}"
        delay: 5
        timeout: 60

    - name: Verify health endpoint
      uri:
        url: "http://localhost:{{ app_port }}/health"
        status_code: 200
      register: health_check
      retries: 3
      delay: 5
      ignore_errors: yes

  rescue:
    - name: Handle deployment failure
      debug:
        msg: "Deployment failed. Check logs with: docker-compose -f {{ compose_project_dir }}/docker-compose.yml logs"

  tags:
    - app_deploy
    - compose