apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "devops-info-service.fullname" . }}-config
  labels:
    {{- include "devops-info-service.labels" . | nindent 4 }}
data:
  config.json: |-
{{ .Files.Get "files/config.json" | indent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "devops-info-service.fullname" . }}-env
  labels:
    {{- include "devops-info-service.labels" . | nindent 4 }}
data:
  APP_ENV: {{ .Values.appConfig.environment | quote }}
  APP_NAME: {{ .Values.appConfig.name | quote }}
  LOG_LEVEL: {{ .Values.appConfig.logLevel | quote }}
  FEATURE_VISITS_COUNTER: {{ .Values.appConfig.features.visitsCounter | quote }}
  FEATURE_PROMETHEUS_METRICS: {{ .Values.appConfig.features.prometheusMetrics | quote }}
  FEATURE_STRUCTURED_LOGGING: {{ .Values.appConfig.features.structuredLogging | quote }}
