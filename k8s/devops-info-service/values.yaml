replicaCount: 3

image:
  repository: netimaaaa/devops-info-service
  tag: "latest"
  pullPolicy: Always

nameOverride: ""
fullnameOverride: ""

service:
  type: NodePort
  port: 80
  targetPort: 8000
  nodePort: 30080

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "200m"

secret:
  username: "placeholder-user"
  password: "placeholder-password"

debug: "false"

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

livenessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

appConfig:
  name: devops-info-service
  environment: dev
  logLevel: info
  features:
    visitsCounter: "true"
    prometheusMetrics: "true"
    structuredLogging: "true"

persistence:
  enabled: true
  size: 100Mi
  storageClass: ""
  mountPath: /data
  visitsFile: /data/visits
