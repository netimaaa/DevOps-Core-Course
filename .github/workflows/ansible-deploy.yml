name: Ansible Deployment

on:
  push:
    branches: [ main, master ]
    paths:
      - 'ansible/**'
      - '.github/workflows/ansible-deploy.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'ansible/**'
  workflow_dispatch:  # Allow manual triggering

jobs:
  lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install ansible ansible-lint

      - name: Run ansible-lint
        run: |
          cd ansible
          ansible-lint playbooks/*.yml || true

  deploy:
    name: Deploy Application
    needs: lint
    runs-on: ubuntu-latest
    # Only run on push to main/master, not on PRs
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Ansible and dependencies
        run: |
          pip install ansible
          ansible-galaxy collection install community.docker

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Create Ansible vault password file
        run: |
          echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > /tmp/vault_pass
          chmod 600 /tmp/vault_pass

      - name: Update inventory with VM details
        run: |
          cd ansible
          # Create dynamic inventory with secrets
          cat > inventory/hosts.ini << EOF
          [webservers]
          devops-vm ansible_host=${{ secrets.VM_HOST }} ansible_user=${{ secrets.VM_USER }} ansible_ssh_private_key_file=~/.ssh/id_rsa ansible_python_interpreter=/usr/bin/python3
          EOF

      - name: Test Ansible connection
        run: |
          cd ansible
          ansible all -i inventory/hosts.ini -m ping --vault-password-file /tmp/vault_pass

      - name: Deploy with Ansible
        run: |
          cd ansible
          ansible-playbook playbooks/deploy.yml \
            -i inventory/hosts.ini \
            --vault-password-file /tmp/vault_pass \
            -v

      - name: Cleanup vault password
        if: always()
        run: |
          rm -f /tmp/vault_pass

  verify:
    name: Verify Deployment
    needs: deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Wait for application to be ready
        run: sleep 15

      - name: Verify main endpoint
        run: |
          echo "Testing main endpoint..."
          curl -f http://${{ secrets.VM_HOST }}:8000 || exit 1

      - name: Verify health endpoint
        run: |
          echo "Testing health endpoint..."
          curl -f http://${{ secrets.VM_HOST }}:8000/health || exit 1

      - name: Display application response
        run: |
          echo "=== Main Endpoint Response ==="
          curl -s http://${{ secrets.VM_HOST }}:8000
          echo ""
          echo "=== Health Endpoint Response ==="
          curl -s http://${{ secrets.VM_HOST }}:8000/health
